[package]
name = "querent-core"
version = "0.1.0"
edition = "2024"

[dependencies]
phf = { version = "0.13" }
ropey = "1.6.1"
strsim = "0.11.1"

[build-dependencies]
phf_codegen = "0.13"

[dev-dependencies]
proptest = "1.5"
criterion = "0.7"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"] }
futures = { version = "0.3", features = ["executor"] }

[[bench]]
name = "parse"
harness = false
