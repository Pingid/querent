name: Deploy Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # 1. Install pnpm first so setup-node can detect it for caching
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      # 2. Setup Node and handle caching, pointing explicitly to your demo folder's lockfile
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
          cache-dependency-path: demo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir demo install

      - name: Configure Pages
        uses: actions/configure-pages@v5
        id: configure-pages

      - name: Build demo
        run: pnpm run build
        working-directory: demo
        env:
          BASE_URL: ${{ steps.configure-pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
